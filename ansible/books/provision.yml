- hosts: "miners"
  become: yes

  tasks:

    - block:

        - name: Start and print ssh cmd
          debug:
            msg: "ssh -A root@{{ ip }} -p {{ ssh_port }}"

        - name: Print re-run provision + start
          debug:
            msg: >
              cd $SUBNET_DIR/38/ansible/ && ansible-playbook -i inventory.ini books/provision.yml --limit {{ inventory_hostname }} --start-at-task='' && cd /media/jorrit/ssd/bittensor/remote_gpu/subnet/38/ansible/ && ansible-playbook -i inventory.ini books/start.yml --limit {{ inventory_hostname }}

        - name: Set active for miner in reg_table
          delegate_to: localhost
          become: no
          shell: |
            set -e
            FILE="$SUBNET_DIR/38/data/reg_table.csv"
            ACTIVE_IDX=$(head -n1 "$FILE" | tr ',' '\n' | nl | awk '$2=="ACTIVE"{print $1}')

            CURRENT=$(awk -F, -v uid="{{ miner_uid }}" 'NR>1 && $1==uid {print $3}' "$FILE")

            if [ "$CURRENT" != "true" ]; then
              awk -F, -v OFS=, -v uid="{{ miner_uid }}" -v col="$ACTIVE_IDX" '
                NR==1 { print; next }
                $1==uid { $col="true" }
                { print }
              ' "$FILE" > "${FILE}.tmp" && mv "${FILE}.tmp" "$FILE"

              cd "$REMOTE_GPU_DIR"
              git add "$FILE"
              git commit -m "auto set ACTIVE=true for {{ miner_uid }}" || true
              git push || true
            else
              echo "ACTIVE already true for {{ miner_uid }}, nothing to do."
            fi
          args:
            executable: /bin/bash
          run_once: true
          when: network != "test"

        - name: Update known_hosts in repo and locally
          delegate_to: localhost
          become: no
          shell: |
            set -e
            : "${REMOTE_GPU_DIR:?REMOTE_GPU_DIR not set}"

            KNOWN_HOSTS="$REMOTE_GPU_DIR/helpers/rest/known_hosts"
            LOCAL_KNOWN="$HOME/.ssh/known_hosts"
            mkdir -p "$(dirname "$KNOWN_HOSTS")" "$(dirname "$LOCAL_KNOWN")"

            ssh-keygen -R "[{{ ip }}]:{{ ssh_port }}" -f "$KNOWN_HOSTS" 2>/dev/null || true
            ssh-keyscan -p {{ ssh_port }} -H {{ ip }} >> "$KNOWN_HOSTS"

            cp "$KNOWN_HOSTS" "$LOCAL_KNOWN"

            cd "$REMOTE_GPU_DIR"
            git add "$KNOWN_HOSTS"
            git commit -m "auto update known_hosts" || true
            git push || true
          args:
            executable: /bin/bash
          run_once: true

        - name: Ensure Python 3.10 repo and packages are available
          block:
            - name: Add deadsnakes PPA
              apt_repository:
                repo: ppa:deadsnakes/ppa
                state: present
              register: ppa_res
              retries: 5
              delay: 10
              until: ppa_res is succeeded

            - name: Update apt cache
              apt:
                update_cache: yes

            - name: Install Python 3.10 and dependencies
              apt:
                name:
                  - python3.10
                  - python3.10-venv
                  - software-properties-common
                  - sudo
                  - jq
                  - npm
                  - nano
                  # - less
                state: present

        - name: Install pm2 globally
          npm:
            name: pm2
            global: yes

        - name: Ensure venv exists
          command: python3.10 -m venv /root/venv
          args:
            creates: /root/venv/bin/activate

        - name: Configure bashrc for auto venv activation, cd into repo, and aliases
          blockinfile:
            path: /root/.bashrc
            create: yes
            marker: "# {mark} D_TRAINING SETUP"
            block: |
              cd /root/d_training 2>/dev/null || true
              source /root/venv/bin/activate 2>/dev/null || true

              echo "{{ netuid }}_{{ miner_uid }}_{{ machine }}_{{ provider }}"

              alias S="source ~/.bashrc"
              alias B="nano +9999 ~/.bashrc"
              # alias L="less +F -R /root/.pm2/logs/distributed-training-miner-out.log"
              alias L="tail -n 500 -F /root/.pm2/logs/distributed-training-miner-out.log"
              alias P="pm2 log --lines 500"
              alias G="git branch -vv"
              alias Z="grep -E '^alias (S|B|L|P|G)=' ~/.bashrc"

        - name: Comment out provider lines
          block:
            - name: Comment RunPod lines
              lineinfile:
                path: /root/.bashrc
                regexp: "{{ item }}"
                line: "# {{ item }}"
                backrefs: yes
              loop:
                - '^cat /etc/runpod\.txt'
                - 'detailed documentation and guides, please visit'
              when: provider == "R"

            - name: Comment Vast lines
              lineinfile:
                path: /root/.bashrc
                regexp: "{{ item }}"
                line: "# {{ item }}"
                backrefs: yes
              loop:
                - 'Welcome to vast\.ai'
                - 'If authentication fails'
              when: provider == "V"

        - name: Enable ports for flag reachability axon_port and dht_port
          block:
            - name: Preseed iptables-persistent
              shell: |
                echo "iptables-persistent iptables-persistent/autosave_v4 boolean true" | debconf-set-selections
                echo "iptables-persistent iptables-persistent/autosave_v6 boolean true" | debconf-set-selections

            - name: Install iptables-persistent
              apt:
                name: iptables-persistent
                state: present
                update_cache: yes

            - name: Allow inbound Axon and DHT ports
              shell: |
                iptables -A INPUT -p tcp --dport {{ miner_flags.axon_port }} -j ACCEPT
                iptables -A INPUT -p tcp --dport {{ miner_flags.dht_port }} -j ACCEPT
                iptables-save > /etc/iptables/rules.v4
              args:
                executable: /bin/bash
          when: provider == "O"

        - name: Enable faster network, BBR if supported
          shell: |
            if [ -f /proc/sys/net/ipv4/tcp_congestion_control ]; then
              echo "net.ipv4.tcp_rmem = 4096 87380 16777216" >> /etc/sysctl.conf
              echo "net.ipv4.tcp_wmem = 4096 65536 16777216" >> /etc/sysctl.conf
              echo "net.ipv4.tcp_congestion_control = bbr" >> /etc/sysctl.conf
              sysctl -p
            fi
          args:
            executable: /bin/bash

        - name: Clone repo
          git:
            repo: "{{ repo }}"
            dest: /root/d_training
            version: "{{ branch }}"
            update: yes
            accept_hostkey: yes

        - name: Print SSH command to connect to this miner
          debug:
            msg: "ssh -A root@{{ ip }} -p {{ ssh_port }}"            

        - name: Install repo in editable mode
          pip:
            name: "/root/d_training"
            editable: true
            virtualenv: /root/venv

        - name: Print continue after install
          debug:
            msg: >
              cd $SUBNET_DIR/38/ansible/ && ansible-playbook -i inventory.ini books/provision.yml --limit {{ inventory_hostname }} --start-at-task='Test bandwidth'        

        - name: Test bandwidth
          shell: |
            source /root/venv/bin/activate
            speedtest --secure 2>&1 | grep -E 'Download:|Upload:'
          args:
            executable: /bin/bash
          register: result
          changed_when: false
          ignore_errors: true

        - name: Print bandwidth result
          debug:
            msg: "{{ result.stdout }}"      

        - name: Login to Weights & Biases
          command: /root/venv/bin/wandb login "{{ lookup('ansible.builtin.env', (network == 'test') | ternary('WANDB_KEY2','WANDB_KEY')) }}"

        - name: Login to HuggingFace
          command: /root/venv/bin/huggingface-cli login --token "{{ lookup('env', (network == 'test') | ternary('HF_KEY2','HF_KEY')) }}"
          args:
            creates: /root/.huggingface/token

        - name: Regenerate coldkeypub
          command: >
            /root/venv/bin/btcli w regen_coldkeypub
            --ss58 {{ coldkey_ss58 }}
            --wallet.name {{ wallet_name }}
            --wallet-path /root/.bittensor/wallets/
          args:
            creates: /root/.bittensor/wallets/{{ wallet_name }}/coldkeypub

        - name: Regenerate hotkey
          command: >
            /root/venv/bin/btcli w regen_hotkey
            --mnemonic "{{ hotkey_mnemonic }}"
            --wallet.name {{ wallet_name }}
            --wallet.hotkey {{ wallet_hotkey }}
            --wallet-path /root/.bittensor/wallets/
          args:
            creates: /root/.bittensor/wallets/{{ wallet_name }}/hotkey

        - name: Add personal R2 env vars
          blockinfile:
            path: /root/d_training/.env
            marker: "# {mark} BASE_R2_ENV"
            create: yes
            block: |
              export R2_ACCOUNT_ID="{{ lookup('ansible.builtin.env', 'R2_ACCOUNT_ID') }}"
              export R2_BUCKET_NAME="{{ miner_flags.model_name }}-{{ miner_uid }}"
              export R2_READ_ACCESS_KEY_ID="{{ lookup('ansible.builtin.env', 'R2_READ_ACCESS_KEY_ID') }}"
              export R2_READ_SECRET_ACCESS_KEY="{{ lookup('ansible.builtin.env', 'R2_READ_SECRET_ACCESS_KEY') }}"
              export R2_WRITE_ACCESS_KEY_ID="{{ lookup('ansible.builtin.env', 'R2_WRITE_ACCESS_KEY_ID') }}"
              export R2_WRITE_SECRET_ACCESS_KEY="{{ lookup('ansible.builtin.env', 'R2_WRITE_SECRET_ACCESS_KEY') }}"
              export R2_ADMIN_ACCESS_KEY_ID="{{ lookup('ansible.builtin.env', 'R2_ADMIN_ACCESS_KEY_ID') }}"
              export R2_ADMIN_SECRET_ACCESS_KEY="{{ lookup('ansible.builtin.env', 'R2_ADMIN_SECRET_ACCESS_KEY') }}"

        - name: Add K R2 env vars
          blockinfile:
            path: /root/d_training/.env
            marker: "# {mark} K_R2_ENV"
            create: yes
            block: |
              export K_R2_ACCOUNT_ID="{{ lookup('ansible.builtin.env', 'K_R2_ACCOUNT_ID') }}"
              export K_R2_BUCKET_NAME="{{ lookup('ansible.builtin.env', 'K_R2_BUCKET_NAME') }}"
              export K_R2_READ_ACCESS_KEY_ID="{{ lookup('ansible.builtin.env', 'K_R2_READ_ACCESS_KEY_ID') }}"
              export K_R2_READ_SECRET_ACCESS_KEY="{{ lookup('ansible.builtin.env', 'K_R2_READ_SECRET_ACCESS_KEY') }}"
              export K_R2_WRITE_ACCESS_KEY_ID="{{ lookup('ansible.builtin.env', 'K_R2_WRITE_ACCESS_KEY_ID') }}"
              export K_R2_WRITE_SECRET_ACCESS_KEY="{{ lookup('ansible.builtin.env', 'K_R2_WRITE_SECRET_ACCESS_KEY') }}"
              export K_R2_ADMIN_ACCESS_KEY_ID="{{ lookup('ansible.builtin.env', 'K_R2_ADMIN_ACCESS_KEY_ID') }}"
              export K_R2_ADMIN_SECRET_ACCESS_KEY="{{ lookup('ansible.builtin.env', 'K_R2_ADMIN_SECRET_ACCESS_KEY') }}"

        - name: Add Influx env vars
          blockinfile:
            path: /root/d_training/.env
            marker: "# {mark} INFLUX_ENV"
            create: yes
            block: |
              export INFLUXDB_URL="{{ lookup('ansible.builtin.env', 'INFLUXDB_URL') }}"
              export INFLUXDB_TOKEN="{{ lookup('ansible.builtin.env', 'INFLUXDB_TOKEN') }}"
              export INFLUXDB_ORG="{{ lookup('ansible.builtin.env', 'INFLUXDB_ORG') }}"
              export INFLUXDB_BUCKET="{{ lookup('ansible.builtin.env', 'INFLUXDB_BUCKET') }}"

      rescue:
        - name: Show rerun command for failed/unreachable task
          debug:
            msg: >
              cd $SUBNET_DIR/38/ansible/ &&
              ansible-playbook -i inventory.ini books/provision.yml
              --limit {{ inventory_hostname }}
              --start-at-task='{{ ansible_failed_result.task | default("unknown task") }}' &&
              cd $SUBNET_DIR/38/ansible/ &&
              ansible-playbook -i inventory.ini books/start.yml
              --limit {{ inventory_hostname }}

      ignore_unreachable: no

      # always:
      #   - name: Print SSH command
      #     debug:
      #       msg: "ssh -A root@{{ ip }} -p {{ ssh_port }}"
