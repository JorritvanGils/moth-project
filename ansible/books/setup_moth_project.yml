    - name: Clone detection dataset (NID)
      git:
        repo: git@github.com:cvjena/nid-dataset.git
        dest: "{{ datasets_dir }}/det/nid"
        accept_hostkey: yes
        # key_file: /root/.ssh/id_rsa
      # ignore_errors: yes
      register: nid_clone

    - name: Clone classification dataset (EU Moths)
      git:
        repo: git@github.com:cvjena/eu-moths-dataset.git
        dest: "{{ datasets_dir }}/cls/eu"
        accept_hostkey: yes
        # key_file: /root/.ssh/id_rsa
      ignore_errors: yes
      register: eu_clone

    - name: Run nid_to_yolo.py conversion
      command:
        cmd: "{{ project_dir }}/.venv/bin/python tasks/nid_to_yolo.py"
        chdir: "{{ project_dir }}"
      when: nid_clone is success
      register: conversion_result
      ignore_errors: yes

    - name: Show conversion result
      debug:
        msg: "NID to YOLO conversion completed"
      when: conversion_result is success

    - name: Create template config file if not exists
      copy:
        content: |
          # Moth Project Configuration
          # Copy this to configs/config.yaml and modify as needed
          
          # Task type: 'det' for detection, 'cls' for classification
          task: det
          
          # Model configuration
          model_type: yolo_n  # or other model types
          
          # Paths
          data_dir: {{ datasets_dir }}
          output_dir: {{ project_dir }}/outputs
          
          # Training parameters
          batch_size: 32
          epochs: 100
          learning_rate: 0.001
          
          # Detection specific
          img_size: 640
          
          # Classification specific
          num_classes: 100
        dest: "{{ project_dir }}/configs/config.template.yaml"
        mode: '0644'

    - name: Create a simple test script
      copy:
        content: |
          #!/bin/bash
          source {{ project_dir }}/.venv/bin/activate
          echo "Environment activated successfully!"
          echo "Python version: $(python --version)"
          echo "Pip list:"
          pip list | grep -E "(torch|ultralytics|moth)"
        dest: "{{ project_dir }}/test_env.sh"
        mode: '0755'

    - name: Display setup summary
      debug:
        msg:
          - "✅ Moth Project setup complete!"
          - "📁 Project location: {{ project_dir }}"
          - "🐍 Virtual environment: {{ project_dir }}/.venv"
          - "📊 Datasets: {{ datasets_dir }}"
          - ""
          - "To activate environment:"
          - "  cd {{ project_dir }} && source .venv/bin/activate"
          - ""
          - "To run training:"
          - "  cd {{ project_dir }} && python -m tasks.train"
          - ""
          - "To test environment:"
          - "  {{ project_dir }}/test_env.sh"