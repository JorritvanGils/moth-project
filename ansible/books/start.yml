      rescue:
        - name: Show rerun command for the failed task
          debug:
            msg: >
              cd $SUBNET_DIR/38/ansible/ &&
              ansible-playbook -i inventory.ini books/start.yml
              --limit {{ inventory_hostname }}
              --start-at-task='{{ ansible_failed_result.task }}'

